<html>
<head>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 5px;
            justify-content: center;
            margin-top: 20px;
        }

        .cell {
            width: 100px;
            height: 100px;
            font-size: 40px;
        }
    </style>
</head>
<body>

<h1>Kolko i krzyzyk PVP</h1>

<form method="POST" action="/move">
    <div class="board">
        {% for i in range(3) %}
            {% for j in range(3) %}
                <button class="cell" name="move" value="{{ i }}-{{ j }}">
                    {{ board[i][j] if board else '' }}
                </button>
            {% endfor %}
        {% endfor %}
    </div>
</form>
</body>
</html>
